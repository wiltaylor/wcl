name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_TOOLCHAIN: "1.92.0"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - run: just dev check
      - run: just dev fmt-check
      - run: just dev lint

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - run: just test rust

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: astral-sh/setup-uv@v7
      - uses: Swatinem/rust-cache@v2
      - run: just test python

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@wasm-pack
      - uses: Swatinem/rust-cache@v2
      - run: just test wasm

  test-dotnet:
    name: Test .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - uses: Swatinem/rust-cache@v2
      - run: just test dotnet

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - uses: Swatinem/rust-cache@v2
      - run: just test go

  pack:
    name: Package
    runs-on: ubuntu-latest
    needs: [check, test-rust, test-python, test-wasm, test-dotnet, test-go]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@wasm-pack
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - uses: Swatinem/rust-cache@v2
      - run: just pack all
      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: .packages/
          retention-days: 1
