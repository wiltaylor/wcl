name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: write

env:
  RUST_TOOLCHAIN: "1.92.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Version ─────────────────────────────────────────────────────────────

  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      do_release: ${{ steps.calc.outputs.do_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: calc
        run: |
          # Get trailers from HEAD commit
          IS_RELEASE=$(git log -1 --format='%(trailers:key=release,valueonly)')
          IS_PRERELEASE=$(git log -1 --format='%(trailers:key=pre-release,valueonly)')

          if [[ "$IS_RELEASE" != "true" && "$IS_PRERELEASE" != "true" ]]; then
            echo "version=0.0.0-alpha" >> "$GITHUB_OUTPUT"
            echo "do_release=false" >> "$GITHUB_OUTPUT"
            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ## Version

          | | |
          |---|---|
          | **Version** | `0.0.0-alpha` |
          | **Release** | No |
          SUMMARY
            exit 0
          fi

          # Find last version tag
          LAST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LAST_TAG" ]]; then
            PREV_MAJOR=0; PREV_MINOR=1; PREV_PATCH=0
            RANGE="HEAD"
          else
            VER="${LAST_TAG#v}"
            VER="${VER%%-*}"  # strip any -alpha suffix
            IFS='.' read -r PREV_MAJOR PREV_MINOR PREV_PATCH <<< "$VER"
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Scan conventional commits for bump level
          BUMP="none"
          while IFS= read -r HASH; do
            SUBJECT=$(git log -1 --format='%s' "$HASH")
            BODY=$(git log -1 --format='%b' "$HASH")
            if echo "$SUBJECT" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$BODY" | grep -qiE '^BREAKING[ -]CHANGE:'; then
              BUMP="major"
            elif echo "$SUBJECT" | grep -qE '^feat(\(.+\))?:' && [[ "$BUMP" != "major" ]]; then
              BUMP="minor"
            elif echo "$SUBJECT" | grep -qE '^(fix|perf|refactor|build|ci|docs|style|test|chore|revert)(\(.+\))?:' && [[ "$BUMP" == "none" ]]; then
              BUMP="patch"
            fi
          done < <(git log --format='%H' $RANGE)

          # Default to patch if no conventional commits found
          [[ "$BUMP" == "none" ]] && BUMP="patch"

          # Apply bump (major → minor while in 0.x.x)
          case "$BUMP" in
            major)
              if [[ "$PREV_MAJOR" -eq 0 ]]; then
                MINOR=$((PREV_MINOR + 1)); PATCH=0; MAJOR=0
              else
                MAJOR=$((PREV_MAJOR + 1)); MINOR=0; PATCH=0
              fi ;;
            minor) MAJOR=$PREV_MAJOR; MINOR=$((PREV_MINOR + 1)); PATCH=0 ;;
            patch) MAJOR=$PREV_MAJOR; MINOR=$PREV_MINOR; PATCH=$((PREV_PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          [[ "$IS_PRERELEASE" == "true" ]] && VERSION="${VERSION}-alpha"

          echo "Calculated version: $VERSION (bump=$BUMP)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "do_release=true" >> "$GITHUB_OUTPUT"

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            RELEASE_TYPE="Pre-release"
          else
            RELEASE_TYPE="Stable"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## Version

          | | |
          |---|---|
          | **Version** | \`$VERSION\` |
          | **Release** | $RELEASE_TYPE |
          | **Bump** | $BUMP |
          | **Previous tag** | \`${LAST_TAG:-none}\` |
          SUMMARY

  # ── Lint ────────────────────────────────────────────────────────────────

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just dev check
      - run: just dev fmt-check
      - run: just dev lint

  # ── Test ────────────────────────────────────────────────────────────────

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: cargo nextest run --workspace --profile ci
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Rust Tests

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: astral-sh/setup-uv@v7
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just build python-wasm
      - run: |
          cd bindings/python
          uv run pytest tests/ -v --junitxml=../../test-results/python.xml
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: test-results/python.xml
          check_name: Python Tests

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@wasm-pack
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just test wasm

  test-dotnet:
    name: Test .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: |
          just build dotnet-wasm
          dotnet test bindings/dotnet/Wcl.sln --logger "junit;LogFilePath=${{ github.workspace }}/test-results/dotnet.xml"
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: test-results/dotnet.xml
          check_name: .NET Tests

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: go install gotest.tools/gotestsum@latest
      - run: |
          just build go
          cd bindings/go && gotestsum --junitfile ../../test-results/go.xml -- -v ./...
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: test-results/go.xml
          check_name: Go Tests

  test-jvm:
    name: Test JVM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: |
          just build jvm-wasm
          cd bindings/jvm && ./gradlew test
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: bindings/jvm/build/test-results/test/*.xml
          check_name: JVM Tests

  test-ruby:
    name: Test Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: bindings/ruby
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: |
          just build ruby-wasm
          cd bindings/ruby && CI_REPORTS="$GITHUB_WORKSPACE/test-results/ruby" bundle exec rake test
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: test-results/ruby/*.xml
          check_name: Ruby Tests

  test-zig:
    name: Test Zig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2, latest commit
        with:
          version: 0.15.2
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just test zig

  # ── Package ─────────────────────────────────────────────────────────────
  # Each package job checks out, stamps the version from the version job,
  # builds its artifact, and uploads it separately.

  pack-rust:
    name: Package Rust
    runs-on: ubuntu-latest
    needs: [version, check, test-rust]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack rust
      - uses: actions/upload-artifact@v7
        with:
          name: package-rust
          path: .packages/rust/
          retention-days: 1

  pack-python:
    name: Package Python
    runs-on: ubuntu-latest
    needs: [version, check, test-python]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: astral-sh/setup-uv@v7
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack python
      - uses: actions/upload-artifact@v7
        with:
          name: package-python
          path: .packages/python/
          retention-days: 1

  pack-wasm:
    name: Package WASM
    runs-on: ubuntu-latest
    needs: [version, check, test-wasm]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@wasm-pack
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack wasm
      - uses: actions/upload-artifact@v7
        with:
          name: package-wasm
          path: .packages/wasm/
          retention-days: 1

  pack-go:
    name: Package Go
    runs-on: ubuntu-latest
    needs: [version, check, test-go]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack go
      - uses: actions/upload-artifact@v7
        with:
          name: package-go
          path: .packages/go/
          retention-days: 1

  pack-dotnet:
    name: Package .NET
    runs-on: ubuntu-latest
    needs: [version, check, test-dotnet]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack dotnet
      - uses: actions/upload-artifact@v7
        with:
          name: package-dotnet
          path: .packages/dotnet/
          retention-days: 1

  pack-jvm:
    name: Package JVM
    runs-on: ubuntu-latest
    needs: [version, check, test-jvm]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack jvm
      - uses: actions/upload-artifact@v7
        with:
          name: package-jvm
          path: .packages/jvm/
          retention-days: 1

  pack-ruby:
    name: Package Ruby
    runs-on: ubuntu-latest
    needs: [version, check, test-ruby]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@just
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: bindings/ruby
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack ruby
      - uses: actions/upload-artifact@v7
        with:
          name: package-ruby
          path: .packages/ruby/
          retention-days: 1

  pack-ffi:
    name: Package C/C++
    runs-on: ubuntu-latest
    needs: [version, check, test-rust, test-zig]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack ffi
      - uses: actions/upload-artifact@v7
        with:
          name: package-ffi
          path: .packages/ffi/
          retention-days: 1

  pack-vscode:
    name: Package VS Code
    runs-on: ubuntu-latest
    needs: [version, check]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack vscode
      - uses: actions/upload-artifact@v7
        with:
          name: package-vscode
          path: .packages/vscode/
          retention-days: 1

  pack-tree-sitter:
    name: Package tree-sitter-wcl
    runs-on: ubuntu-latest
    needs: [version, check, test-rust]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: tree-sitter/setup-action@v2
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: just pack tree-sitter-wcl
      - uses: actions/upload-artifact@v7
        with:
          name: package-tree-sitter-wcl
          path: .packages/tree-sitter-wcl/
          retention-days: 1

  pack-extras:
    name: Package Extras
    runs-on: ubuntu-latest
    needs: [version, check]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - run: just pack set-version "${{ needs.version.outputs.version }}"
      - run: |
          just pack highlight-queries
          just pack sublime-syntax
          just pack highlightjs
          just pack chroma
          just pack pygments
      - uses: actions/upload-artifact@v7
        with:
          name: package-highlight-queries
          path: .packages/highlight-queries/
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: package-sublime-syntax
          path: .packages/sublime-syntax/
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: package-highlightjs
          path: .packages/highlightjs/
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: package-chroma
          path: .packages/chroma/
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: package-pygments
          path: .packages/pygments/
          retention-days: 1

  # ── Release ──────────────────────────────────────────────────────────────

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, pack-rust, pack-python, pack-wasm, pack-go, pack-dotnet,
            pack-jvm, pack-ruby, pack-ffi, pack-vscode, pack-tree-sitter, pack-extras]
    if: needs.version.outputs.do_release == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          prerelease: ${{ contains(needs.version.outputs.version, '-alpha') }}
          files: artifacts/**/*

  # ── Publish ─────────────────────────────────────────────────────────────

  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: [version, release]
    if: needs.version.outputs.do_release == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # ── Rust → crates.io ──
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01
      - name: Publish Rust crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          just pack set-version "${{ needs.version.outputs.version }}"
          for crate in wcl_derive wcl_core wcl_eval wcl_schema wcl_serde wcl wcl_lsp wcl_cli wcl_ffi; do
            echo "Publishing $crate..."
            cargo publish -p $crate --no-verify
            sleep 30
          done

      # ── Python → PyPI ──
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload artifacts/package-python/* --non-interactive

      # ── JavaScript → npm ──
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          NPM_TAG=$([[ "${{ needs.version.outputs.version }}" == *-* ]] && echo "next" || echo "latest")
          npm publish artifacts/package-wasm/*.tgz --access public --tag "$NPM_TAG"

      # ── .NET → NuGet ──
      - name: Publish to NuGet
        run: |
          dotnet nuget push "artifacts/package-dotnet/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }}

      # ── JVM → GitHub Packages ──
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: taiki-e/install-action@just
      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          just pack set-version "${{ needs.version.outputs.version }}"
          just build jvm-wasm
          cd bindings/jvm && ./gradlew publish

      # ── Ruby → RubyGems ──
      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push artifacts/package-ruby/*.gem
