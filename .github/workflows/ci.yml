name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read

env:
  RUST_TOOLCHAIN: "1.92.0"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2
      - run: just dev check
      - run: just dev fmt-check
      - run: just dev lint

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
      - run: cargo nextest run --workspace --profile ci
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Rust Tests

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: astral-sh/setup-uv@v7
      - uses: Swatinem/rust-cache@v2
      - run: |
          cd bindings/python
          uv run --group dev maturin develop
          uv run --group dev python -m pytest tests/ -v --junitxml=../../test-results/python.xml
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: test-results/python.xml
          check_name: Python Tests

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@wasm-pack
      - uses: Swatinem/rust-cache@v2
      - run: just test wasm

  test-dotnet:
    name: Test .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - uses: Swatinem/rust-cache@v2
      - run: |
          just build dotnet-native
          dotnet test bindings/dotnet/Wcl.sln --logger "junit;LogFilePath=${{ github.workspace }}/test-results/dotnet.xml"
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: test-results/dotnet.xml
          check_name: .NET Tests

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - uses: Swatinem/rust-cache@v2
      - run: go install gotest.tools/gotestsum@latest
      - run: |
          just build go
          cd bindings/go && CGO_ENABLED=1 gotestsum --junitfile ../../test-results/go.xml -- -v ./...
      - uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: test-results/go.xml
          check_name: Go Tests

  pack:
    name: Package
    runs-on: ubuntu-latest
    needs: [check, test-rust, test-python, test-wasm, test-dotnet, test-go]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@wasm-pack
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - uses: Swatinem/rust-cache@v2
      - run: just pack all
      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: ${{ github.workspace }}/.packages/
          retention-days: 1
